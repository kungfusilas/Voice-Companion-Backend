scenario: idempotency
description: processing the identical extraction twice yields one active fact
events:
  - time: "2026-01-10"
    companion: aeva
    user: "I live in Bethlehem."
    extraction:
      - {subject_type: user, predicate: home_city, value_json: {city: Bethlehem}, confirmation_status: explicitly_stated, valid_from: "2026-01-10"}
  - time: "2026-01-10"
    companion: aeva
    user: "I live in Bethlehem."
    extraction:
      - {subject_type: user, predicate: home_city, value_json: {city: Bethlehem}, confirmation_status: explicitly_stated, valid_from: "2026-01-10"}
  - checkpoint: after_double
    expected_active:
      - {key: user.home_city, value: {city: Bethlehem}}
    expected_counts: {user.home_city: 1}
