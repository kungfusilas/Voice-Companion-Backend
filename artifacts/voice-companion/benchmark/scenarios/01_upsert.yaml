scenario: upsert
description: a stated fact is stored active
events:
  - time: "2026-01-10"
    companion: aeva
    user: "I live in Bethlehem, Pennsylvania."
    extraction:
      - {subject_type: user, predicate: home_city, value_json: {city: Bethlehem, state: Pennsylvania}, confirmation_status: explicitly_stated, valid_from: "2026-01-10"}
  - checkpoint: after_upsert
    expected_active:
      - {key: user.home_city, value: {city: Bethlehem, state: Pennsylvania}}
    expected_counts: {user.home_city: 1}
