kind = "web"
    previewPath = "/companion/"
    title = "Voice Companion"
    version = "1.0.0"
    id = "artifacts/voice-companion"

    [[integratedSkills]]
    name = "react-vite"
    version = "1.0.0"

    [[services]]
    name = "web"
    paths = ["/companion/"]
    localPort = 3000

    [services.development]
    run = "pnpm --filter @workspace/voice-companion run dev"

    [services.env]
    PORT = "3000"
    BASE_PATH = "/companion/"

    [services.production]

    [services.production.build]
    args = ["bash", "-c", "PORT=3000 BASE_PATH=/companion/ pnpm --filter @workspace/voice-companion run build"]

    [services.production.build.env]
    NODE_ENV = "production"

    [services.production.run]
    args = ["bash", "-c", "uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1"]

    [services.production.run.env]
    PORT = "3000"
    PYTHONPATH = "/home/runner/workspace/artifacts/voice-companion"
    NODE_ENV = "production"

    [services.production.health.startup]
    path = "/companion/health"
  